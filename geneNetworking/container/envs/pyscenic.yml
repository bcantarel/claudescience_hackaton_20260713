# pyscenic — single-cell Tier-4 pySCENIC environment
# ---------------------------------------------------------------------------
# Reproduces the pinned stack from pyscenic_tier4/Dockerfile. Kept as its own
# conda env because pyscenic 0.12.1 uses np.object internally (removed in
# numpy 1.24), so it REQUIRES numpy<1.24 — incompatible with the numpy-2.x
# `coexpr` env. Runs pyscenic_tier4/pyscenic_tier4.py (GRNBoost2 -> cisTarget
# motif pruning -> AUCell) on the cross-species single-cell atlases.
#
# Versions match the original working Dockerfile exactly.
name: pyscenic
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  - numpy=1.23.5
  - pandas=1.5.3
  - scipy=1.10.1
  - numba=0.57.1
  - pip
  - pip:
      - pyscenic==0.12.1
      - ctxcore==0.2.0
      - arboreto==0.1.6
      - dask==2023.5.0
      - distributed==2023.5.0
      - anndata==0.9.2
      - scanpy==1.9.8
      - "pyarrow>=11,<13"
